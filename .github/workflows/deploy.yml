name: CI/CD Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/esselle7/agos-backend

jobs:

  # ── Test ──────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agos
          POSTGRES_PASSWORD: agos
          POSTGRES_DB: agosdb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # I test usano %test.mp.jwt.verify.publickey.location=publicKey.pem
      # → generiamo una coppia RSA temporanea (non serve sicurezza, solo che il formato sia valido)
      - name: Generate test RSA keys
        run: |
          openssl genrsa -out /tmp/rsa.pem 2048 2>/dev/null
          openssl rsa -in /tmp/rsa.pem -pubout -outform PEM \
            -out src/main/resources/publicKey.pem 2>/dev/null
          openssl pkcs8 -topk8 -inform PEM -outform PEM -nocrypt \
            -in /tmp/rsa.pem -out src/main/resources/privateKey.pem 2>/dev/null

      - name: Run tests
        run: mvn test -Dquarkus.profile=test

  # ── Build & Push immagine Docker ─────────────────────────────────────────
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy su VPS ─────────────────────────────────────────────────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            # Login a GHCR per poter pullare l'immagine
            echo "${{ secrets.GHCR_PULL_TOKEN }}" | docker login ghcr.io -u esselle7 --password-stdin

            cd ~/app

            # Pull nuova immagine e riavvia solo il backend (zero-downtime)
            docker compose --env-file .env.prod pull backend
            docker compose --env-file .env.prod up -d --no-deps backend

            # Pulizia immagini vecchie
            docker image prune -f

            # Verifica che il container sia su
            sleep 15
            docker compose ps backend
