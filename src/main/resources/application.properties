# ============================================================
# Quarkus – application.properties
# Gestionale Agostinelli – Backend
# ============================================================

# ============================================================
# PROFILO DEV – PostgreSQL locale via Docker
# ============================================================

%dev.quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.username=agos
%dev.quarkus.datasource.password=agos
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/agosdb

# HikariCP – pool conservativo per dev (max 5 connessioni)
%dev.quarkus.datasource.jdbc.max-size=5
%dev.quarkus.datasource.jdbc.min-size=1
%dev.quarkus.datasource.jdbc.acquisition-timeout=30s

# Flyway dev: esegue tutte le migration inclusi i seed di test (V7)
%dev.quarkus.flyway.migrate-at-start=true
%dev.quarkus.flyway.locations=classpath:db/migration,classpath:db/seed/dev
%dev.quarkus.flyway.clean-at-start=false
%dev.quarkus.flyway.baseline-on-migrate=false

# Log SQL in dev (utile per debug query Panache)
%dev.quarkus.hibernate-orm.log.sql=false
%dev.quarkus.log.category."org.hibernate.SQL".level=DEBUG

# ============================================================
# PROFILO TEST – PostgreSQL dedicato (CI/CD)
# ============================================================

%test.quarkus.datasource.db-kind=postgresql
%test.quarkus.datasource.username=agos
%test.quarkus.datasource.password=agos
%test.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/agosdb_test
%test.quarkus.datasource.jdbc.max-size=5
%test.quarkus.devservices.enabled=false

%test.quarkus.flyway.migrate-at-start=true
%test.quarkus.flyway.locations=classpath:db/migration
%test.quarkus.flyway.clean-at-start=true

%test.app.rate-limit.max-requests-per-minute=10000

%test.quarkus.oidc.client-id=test-placeholder
%test.quarkus.oidc.credentials.secret=test-placeholder
%test.quarkus.oidc.tenant-enabled=false
%test.mp.jwt.verify.publickey.location=publicKey.pem

# ============================================================
# PROFILO PROD – Neon PostgreSQL (URL da env variable)
# ============================================================

%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=${DB_USER}
%prod.quarkus.datasource.password=${DB_PASSWORD}
%prod.quarkus.datasource.jdbc.url=${DATABASE_URL}

# HikariCP – max 10 connessioni (limite piano Neon free tier)
%prod.quarkus.datasource.jdbc.max-size=10
%prod.quarkus.datasource.jdbc.min-size=2
%prod.quarkus.datasource.jdbc.acquisition-timeout=30s

# DB locale Docker: SSL non necessario (stessa rete interna)
%prod.quarkus.datasource.jdbc.additional-jdbc-properties.sslmode=disable
%prod.quarkus.datasource.jdbc.connect-timeout=10s

# Flyway prod: SOLO migration, mai seed dev (V7 non incluso nel path prod)
%prod.quarkus.flyway.migrate-at-start=true
%prod.quarkus.flyway.locations=classpath:db/migration
# clean vietato in prod: impossibile cancellare lo schema per errore.
%prod.quarkus.flyway.clean-disabled=true
# DISCIPLINA POST-GO-LIVE — il DB di prod riparte da zero (vuoto): da qui le migration sono
# CONGELATE e solo-append (V13, V14, …). Niente squash, niente modifiche a migration già applicate.
#  - baseline-on-migrate=false: nessun "baseline" silenzioso; su DB vuoto applica V1.. da capo.
#  - validate-on-migrate=true (+ NIENTE ignore-migration-patterns): se una migration già applicata
#    viene cambiata o rimossa, Flyway FALLISCE al boot di proposito, invece di corrompere i dati.
%prod.quarkus.flyway.baseline-on-migrate=false
%prod.quarkus.flyway.validate-on-migrate=true

# ============================================================
# CLOUDFLARE R2 (storage menu PDF eventi)
# ============================================================
# In prod i valori arrivano da variabili d'ambiente.
# In locale application-local.properties (gitignored) li sovrascrive:
# è caricato come config source extra e ignorato se assente (prod/CI).
smallrye.config.locations=application-local.properties

r2.endpoint=${R2_ENDPOINT:}
r2.bucket-name=${R2_BUCKET_NAME:}
r2.access-key-id=${R2_ACCESS_KEY_ID:}
r2.secret-access-key=${R2_SECRET_ACCESS_KEY:}
r2.public-base-url=${R2_PUBLIC_BASE_URL:}

# ============================================================
# HIBERNATE ORM (Panache)
# ============================================================

# Lasciare "validate" in prod: Flyway gestisce il DDL, non Hibernate
quarkus.hibernate-orm.database.generation=none
%dev.quarkus.hibernate-orm.database.generation=none

# JDBC batching: raggruppa gli INSERT/UPDATE (es. import movimenti bulk) in
# round-trip da 50 invece di una statement per riga. order-inserts/updates
# raggruppa per entità così il batch è effettivo. Solo infrastruttura, nessuna
# modifica di logica nel service/repository.
quarkus.hibernate-orm.jdbc.statement-batch-size=50
quarkus.hibernate-orm.jdbc.order-inserts=true
quarkus.hibernate-orm.jdbc.order-updates=true

# ============================================================
# GOOGLE OAuth2 / OpenID Connect
# ============================================================

# Configurati via env variable per sicurezza – non hard-coded
quarkus.oidc.client-id=${GOOGLE_CLIENT_ID}
quarkus.oidc.credentials.secret=${GOOGLE_CLIENT_SECRET}
quarkus.oidc.auth-server-url=https://accounts.google.com
quarkus.oidc.application-type=web-app
quarkus.oidc.authentication.redirect-path=/auth/google/callback

%dev.quarkus.oidc.client-id=${GOOGLE_CLIENT_ID:placeholder}
%dev.quarkus.oidc.credentials.secret=${GOOGLE_CLIENT_SECRET:placeholder}

# ============================================================
# JWT INTERNO (token di sessione generato dal backend)
# ============================================================

mp.jwt.verify.issuer=https://agostinelli.gestionale
mp.jwt.token.expiration.grace=60

# ============================================================
# LOGGING
# ============================================================

quarkus.log.level=INFO
%dev.quarkus.log.level=DEBUG
%prod.quarkus.log.level=WARN

# ============================================================
# HTTP
# ============================================================

quarkus.http.port=8080
%prod.quarkus.http.port=8080

# CORS: (FE) → (BE)
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:4200}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization

# ============================================================
# HEALTH CHECK
# ============================================================

quarkus.smallrye-health.root-path=/q/health
quarkus.datasource.health.enabled=true

# ============================================================
# OPENAPI / SWAGGER UI
# ============================================================

quarkus.smallrye-openapi.info-title=Gestionale Agostinelli API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Backend gestionale economico-finanziario Agriturismo Agostinelli
quarkus.swagger-ui.always-include=true
%prod.quarkus.swagger-ui.always-include=false

# ============================================================
# CACHE
# ============================================================

quarkus.cache.caffeine."dashboard-kpi".expire-after-write=5M
quarkus.cache.caffeine."dashboard-andamento".expire-after-write=30M
quarkus.cache.caffeine."dashboard-bufatturato".expire-after-write=5M
# KPI dello storico import: aggregazioni che cambiano solo su import/classificazione.
# TTL breve (2m) + invalidazione esplicita sui mutator → mai dati stantii visibili.
quarkus.cache.caffeine."import-kpi".expire-after-write=2M

# Reporting
reporting.mv.refresh-interval=30m

# Forecast baseline (layer STIMATO del previsionale: ricavi cash per giorno-della-settimana)
forecast.baseline.finestra-settimane=8
forecast.baseline.cron=0 0 3 * * ?
# Soglia anti-rumore: segmento (conto, dow) escluso dalla stima se osservato in meno giorni distinti.
# Con finestra 8 settimane un dow ricorre al massimo 8 volte → soglia bassa (es. 4 = metà settimane).
forecast.baseline.min-giorni=4
# Orizzonte massimo della stima: oltre, solo certo (una media settimanale su 6 mesi ignora la stagione).
forecast.baseline.orizzonte-giorni=90

# ============================================================
# APP CONFIG
# ============================================================

# URL frontend — per redirect post-OAuth Google
# Override in prod via env var APP_FRONTEND_URL (Quarkus mappa auto APP_FRONTEND_URL → app.frontend.url)
app.frontend.url=${APP_FRONTEND_URL:http://localhost:4200}

# ============================================================
# FEATURE FLAGS
# ============================================================

# Email autorizzate alla prima registrazione (comma-separated). Gestite via env var APP_SECURITY_ALLOWED_EMAILS.
# Se non impostata, nessun nuovo utente può registrarsi.
%prod.app.security.allowed-emails=${APP_SECURITY_ALLOWED_EMAILS}

# Cookie OAuth state: in prod (HTTPS) deve essere Secure; in dev/test localhost è false.
app.security.cookie-secure=false
%prod.app.security.cookie-secure=true

# ============================================================
# AUTH – Google OAuth2 REST clients
# ============================================================

quarkus.rest-client.google-oauth.url=https://oauth2.googleapis.com
quarkus.rest-client.google-certs.url=https://www.googleapis.com

# URL di redirect configurabile per ambiente
app.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/auth/google/callback}

# ============================================================
# CACHE – Chiavi JWKS Google (1 ora, aggiornate raramente)
# ============================================================

quarkus.cache.caffeine."google-certs".expire-after-write=1H

# ============================================================
# JWT – Chiave pubblica per verifica SmallRye JWT
# ============================================================

# Dev: usa il file PEM nel classpath (src/main/resources/publicKey.pem)
%dev.mp.jwt.verify.publickey.location=publicKey.pem
%dev.smallrye.jwt.sign.key.location=privateKey.pem

# Prod: usa variabili d'ambiente BASE64_PUBLIC_KEY / BASE64_PRIVATE_KEY
%prod.mp.jwt.verify.publickey=${BASE64_PUBLIC_KEY}
%prod.smallrye.jwt.sign.key=${BASE64_PRIVATE_KEY}

# ============================================================
# MV REFRESH ASINCRONO POST-SCRITTURA
# ============================================================
# Quando una scrittura (movimento / pagamento evento / rata ricorrente) commit-a,
# le materialized view P&L / CF vengono refresh-ate fuori dalla request, così la
# dashboard mostra i nuovi dati senza aspettare il tick dello scheduler 30m.
# Disabilitato nei test per evitare 405 refresh extra che rallenterebbero la
# build senza coprire un comportamento osservabile dai test stessi.
reporting.mv.async-on-write=true
reporting.mv.async-debounce-ms=200
%test.reporting.mv.async-on-write=false
